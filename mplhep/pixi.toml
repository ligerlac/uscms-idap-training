[workspace]
channels = ["conda-forge"]
name = "mplhep"
platforms = ["linux-64", "osx-64", "osx-arm64", "linux-aarch64"]
version = "0.1.0"

[tasks.lab]
description = "Launch Jupyter Lab"
cmd = "jupyter lab"

[tasks.start]
depends-on = ["lab"]

[dependencies]
mplhep = ">=1.1.2,<2"
hist = ">=2.10.1,<3"
scikit-hep-testdata = ">=0.6.5,<0.7"
root_base = ">=6.38.4,<7"
uproot = ">=5.7.4,<6"
notebook = ">=7.5.6,<8"
jupyterlab = ">=4.5.7,<5"
ipywidgets = ">=8.1.8,<9"
